name: CI

# Merge gate: runs on every PR and on pushes to any branch. Branch protection
# on main should require this workflow so a red suite blocks merges.
on:
  pull_request:
  push:
    branches-ignore: [main] # main is covered by the deploy workflow's gated build
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Firestore emulator (test:integration) needs a JRE.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run test:integration
      - run: npm run build
